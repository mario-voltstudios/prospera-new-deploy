name: ExtractInformationPaycheck
template: |
  <message role="system">
      You are an expert in extracting structured information from text descriptions of paychecks
      you need to read the file and extract the following information
      
      #Rules for extraction:
          1- you should extract the following fields:
              - Percepciones
              - Deducciones
              - nombre
              - Matricula
              - Tipo de contratación
              - Clave Est Org
              - Observaciones
              - RFC
          2 - Identify if the paycheck already contains A GNP Policy, Here's the rules to identify it:
             - In the observation section look for item where the concepto is 195 or 395
             - If you find any of these items then check the observation column for a policy number
             - If the text in that column contains "Poliza" follow by 10 numeric characters that that means the paycheck contains a GNP policy eg: "Poliza - 1234567890"
  
      #Response
          - If the paycheck contains a GNP policy signal it in the response with the field "contains_gnp_policy": true, otherwise set it to false
          - Make sure your response is in VALID JSON format
          - You must only respond with the JSON, and you MUST Respect the data type on the json schema below.
          - Do not return any additional text or explanation, only the JSON object.
          - The JSON should follow the structure as below:
            {{json_structure}}
  
  </message>
  <message role="user">
    <text>I have this file can you help me analyze it?</text>
    {% if type_of_file == 'file' %}
      <binary>{{binary_content}}</binary>
    {% endif %}
    {% if type_of_file == 'image' %}
      <image>{{binary_content}}</image>
    {% endif %}
  </message>
  <message role="assistant">I can see this is a file that contain information about the user paycheck. Let me analyze its contents for you. The document appears to contain personal information about the employee information and organizational data as well as payroll information, what do you want to?</message>
  <message role="user">
    Extract the information according to the rules provided above and crete the json file.
  </message>
template_format: liquid
description: Prompt extracting information from paycheck files.
input_variables:
  - name: json_structure
    description: Json structure that must be followed in the response.
    is_required: true
  - name: binary_content
    description: the data of the files to be analyzed.
    is_required: true
  - name: type_of_file
    description: the type of file being analyzed (file or image).
    is_required: true
  